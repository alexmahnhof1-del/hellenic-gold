<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Cream background circle -->
  <circle cx="32" cy="32" r="32" fill="#F8F3EB"/>
  <!-- Gold ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#C8A24A" stroke-width="2.5"/>

  <!-- Main stem of olive branch -->
  <path d="M18 50 Q24 40 28 32 Q32 22 40 16"
        stroke="#3B5828" stroke-width="2" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Leaves left side -->
  <path d="M22 46 Q16 42 18 36 Q22 38 22 46z" fill="#3B5828"/>
  <path d="M25 38 Q18 35 21 28 Q26 31 25 38z" fill="#4E7239"/>
  <path d="M30 29 Q24 24 27 18 Q32 22 30 29z" fill="#3B5828"/>

  <!-- Leaves right side -->
  <path d="M24 44 Q30 40 34 44 Q30 48 24 44z" fill="#6A9455"/>
  <path d="M29 34 Q35 30 38 35 Q33 38 29 34z" fill="#4E7239"/>
  <path d="M34 24 Q40 21 42 26 Q37 28 34 24z" fill="#3B5828"/>

  <!-- Olives -->
  <ellipse cx="22" cy="50" rx="4.5" ry="3.5" fill="#4E7239"/>
  <ellipse cx="30" cy="50" rx="4" ry="3.5" fill="#3B5828"/>
  <ellipse cx="26" cy="44" rx="3.5" ry="3" fill="#6A9455"/>

  <!-- Olive highlights -->
  <ellipse cx="21" cy="48.5" rx="1.5" ry="1" fill="#6A9455" opacity=".6"/>
  <ellipse cx="29" cy="48.5" rx="1.5" ry="1" fill="#6A9455" opacity=".5"/>
</svg>
